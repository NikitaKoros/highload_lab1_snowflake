services:
  postgres:
    image: postgres:15
    container_name: highload_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snowflake
    ports:
      - "5433:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
      - ./data:/data
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
